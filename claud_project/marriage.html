
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin: 10px 0 5px;
        }
        input[type="text"], input[type="date"], input[type="email"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .success, .error {
            text-align: center;
            margin-top: 20px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Marriage Registration</h2>
        <form id="marriageForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>

            <label for="partnerName">Partner's Name:</label>
            <input type="text" id="partnerName" name="partnerName" required>

            <label for="marriageDate">Marriage Date:</label>
            <input type="date" id="marriageDate" name="marriageDate" required>

            <button type="button" onclick="registerMarriage()">Register</button>
        </form>
        <div id="message" class="success" style="display: none;">Registration Successful!</div>
        <div id="error" class="error" style="display: none;">Registration Failed. Try again.</div>
    </div>

    <script>
        function registerMarriage() {
            const form = document.getElementById('marriageForm');
            const fullName = form.fullName.value;
            const email = form.email.value;
            const dob = form.dob.value;
            const partnerName = form.partnerName.value;
            const marriageDate = form.marriageDate.value;

            const successMessage = document.getElementById('message');
            const errorMessage = document.getElementById('error');

            if (!fullName || !email || !dob || !partnerName || !marriageDate) {
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }

            form.reset();
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
