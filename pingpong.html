<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ping Pong Game</title>
    <style>
        * { padding: 0; margin: 0; }
        canvas { background: #eee; display: block; margin: 20px auto; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // create the paddle
        const paddleWidth = 10, paddleHeight = 100;

        const user = {
            x: 0,
            y: canvas.height/2 - paddleHeight/2,
            width: paddleWidth,
            height: paddleHeight,
            color: 'BLUE',
            score: 0
        }

        const com = {
            x: canvas.width - paddleWidth,
            y: canvas.height/2 - paddleHeight/2,
            width: paddleWidth,
            height: paddleHeight,
            color: 'RED',
            score: 0
        }

        // create the ball
        const ballRadius = 10;
        const ball = {
            x: canvas.width/2,
            y: canvas.height/2,
            radius: ballRadius,
            speed: 5,
            velocityX: 5,
            velocityY: 5,
            color: 'GREEN'
        }

        // draw rectangle function
        function drawRect(x, y, w, h, color) {
            context.fillStyle = color;
            context.fillRect(x, y, w, h);
        }

        // draw circle function
        function drawCircle(x, y, r, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, r, 0, Math.PI*2, false);
            context.closePath();
            context.fill();
        }

        // draw text
        function drawText(text, x, y, color) {
            context.fillStyle = color;
            context.font = "45px fantasy";
            context.fillText(text, x, y);
        }

        // render the game
        function render() {
            // clear the canvas
            drawRect(0, 0, canvas.width, canvas.height, '#FFFAF0');

            // draw the user and computer paddle
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(com.x, com.y, com.width, com.height, com.color);

            // draw the ball
            drawCircle(ball.x, ball.y, ball.radius, ball.color);

            // draw the score
            drawText(user.score, canvas.width/4, canvas.height/5, 'BLACK');
            drawText(com.score, 3*canvas.width/4, canvas.height/5, 'BLACK');
        }

        // control the user paddle
        canvas.addEventListener('mousemove', movePaddle);

        function movePaddle(evt) {
            let rect = canvas.getBoundingClientRect();

            user.y = evt.clientY - rect.top - user.height/2;
        }

        // collision detection
        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
        }

        // reset the ball
        function resetBall() {
            ball.x = canvas.width/2;
            ball.y = canvas.height/2;
            ball.speed = 5;
            ball.velocityX = -ball.velocityX;
        }

        // update: position, move, score, ...
        function update() {
            // move the ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // simple AI to control the computer paddle
            let computerLevel = 0.1;
            com.y += (ball.y - (com.y + com.height/2)) * computerLevel;

            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            let player = (ball.x + ball.radius < canvas.width/2) ? user : com;

            if (collision(ball, player)) {
                let collidePoint = ball.y - (player.y + player.height/2);
                collidePoint = collidePoint / (player.height/2);

                // calculate angle in RADIAN
                let angleRad = collidePoint * Math.PI/4;

                // X direction of the ball when it's hit
                let direction = (ball.x + ball.radius < canvas.width/2) ? 1 : -1;

                // change velocity X and Y
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                // speed up the ball
                ball.speed += 0.1;
            }

            // update the score
            if (ball.x - ball.radius < 0) {
                com.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                user.score++;
                resetBall();
            }
        }

        // game init
        function game() {
            update();
            render();
        }

        // loop
        const framePerSecond = 50;
        setInterval(game, 1000/framePerSecond);
    </script>
</body>
</html>
